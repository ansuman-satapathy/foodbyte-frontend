server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers.
    # Vite hashes filenames (e.g. main.abc123.js) so cache-busting is automatic.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — any route that isn't a real file gets index.html.
    # Without this, refreshing on /orders returns 404 from nginx
    # because there is no /orders file on disk.
    location / {
        try_files $uri $uri/ /index.html;
    }
}